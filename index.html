<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ranked Cards</title>
  <link rel="stylesheet" type="text/css" href="front-end/styles/mobile.css">
</head>

<script>
  // Detect system theme on first load
  window.addEventListener("DOMContentLoaded", () => {

    const savedTheme = localStorage.getItem("theme");

    // If user already manually selected a theme
    if (savedTheme) {
      if (savedTheme === "light") {
        document.body.classList.add("light");
      }
    }

    // Otherwise use system preference
    else {
      const prefersLight = window.matchMedia("(prefers-color-scheme: light)").matches;

      if (prefersLight) {
        document.body.classList.add("light");
      }
    }
  });

  // Toggle button
  function toggleTheme() {
    document.body.classList.toggle("light");

    // Save preference
    if (document.body.classList.contains("light")) {
      localStorage.setItem("theme", "light");
    } else {
      localStorage.setItem("theme", "dark");
    }
  }
</script>

<body>
    <button class="theme-toggle" onclick="toggleTheme()">Toggle theme</button>
  <section class="panel">
    <div class="date-row">
      <h1>SpiderHouse :: Dashboard</h1>
    </div>

    <div class="card-list">
      <div class="rank-card">

      </div>
    </div>
  </section>
  <section class="panel-side">

      <a class="rank-card" href="dashboard.html">

</body>
</html>
